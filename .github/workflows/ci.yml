name: ci
on:
  pull_request:
    branches: [main]
jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.26.0"
    - name: Test auth (GetApiKey)
      run: go test -cover ./...
    - name: Intall gosec
      run: go install github.com/securego/gosec/v2/cmd/gosec@latest
    - name: Security check
      run: gosec ./...
  style:
    name: Style
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.26.0"
    - name: Check code formatting
      run: test -z $(go fmt ./...)
    - name: Install staticcheck
      run: go install honnef.co/go/tools/cmd/staticcheck@latest
    - name: Check linting
      run: staticcheck ./...
